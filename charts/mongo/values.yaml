replicaCount: 1
image:
  repository: mongo
  tag: "7.0"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 27017
  targetPort: 27017
storage:
  size: 5Gi
  storageClassName: gp2
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
namespace: production
auth:
  secretName: law-ai-secret

