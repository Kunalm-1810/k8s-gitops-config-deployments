kube-prometheus-stack:
  grafana:
    enabled: true
    adminPassword: "law-ai-grafana"
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: monitoring
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - grafana.law-ai.kodetechm.com
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: Law-AI
            type: file
            disableDeletion: false
            options:
              path: /var/lib/grafana/dashboards/default
    dashboards:
      default:
        cluster-overview:
          gnetId: 15760
          revision: 1
          datasource: Prometheus
        kubernetes-pods:
          gnetId: 6417
          revision: 1
          datasource: Prometheus
        node-exporter:
          gnetId: 1860
          revision: 37
          datasource: Prometheus

  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp2
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
      additionalScrapeConfigs:
        - job_name: node-exporter-worker-nodes
          static_configs:
            - targets: []
          file_sd_configs:
            - files:
                - /etc/prometheus/targets/*.json

  alertmanager:
    config:
      global:
        resolve_timeout: 5m
        slack_api_url: "https://hooks.slack.com/services/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"
      route:
        group_by: ["alertname", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 1h
        receiver: slack-notifications
      receivers:
        - name: slack-notifications
          slack_configs:
            - channel: "#alerts"
              send_resolved: true
              title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
              text: >-
                {{ range .Alerts }}
                *Namespace:* {{ .Labels.namespace }}
                *Description:* {{ .Annotations.description }}
                {{ end }}

  additionalPrometheusRulesMap:
    law-ai-rules:
      groups:
        - name: law-ai.pod-restarts
          rules:
            - alert: PodRestartingTooOften
              expr: increase(kube_pod_container_status_restarts_total[5m]) > 3
              for: 1m
              labels:
                severity: warning
              annotations:
                summary: "Pod {{ $labels.pod }} restarting too often"
                description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted more than 3 times in 5 minutes."

        - name: law-ai.high-cpu
          rules:
            - alert: HighCPUUsage
              expr: sum(rate(container_cpu_usage_seconds_total{namespace=~"production|staging"}[5m])) by (pod, namespace) > 0.8
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "High CPU on {{ $labels.pod }}"
                description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} CPU usage above 80% for 5 minutes."

        - name: law-ai.high-error-rate
          rules:
            - alert: HighErrorRate
              expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service) > 0.05
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "High error rate on {{ $labels.service }}"
                description: "Service {{ $labels.service }} error rate above 5% for 5 minutes."
