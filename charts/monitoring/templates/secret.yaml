# DO NOT add real webhook URL here - apply via kubectl:
# kubectl create secret generic alertmanager-slack-secret \
#   --from-literal=alertmanager.yaml='...' \
#   -n monitoring
#
# This file is a placeholder to document the secret structure
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-slack-secret
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      slack_api_url: "REPLACE_WITH_SLACK_WEBHOOK"
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
      receiver: slack-notifications
    receivers:
      - name: slack-notifications
        slack_configs:
          - channel: "#alerts"
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Namespace:* {{ .Labels.namespace }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
