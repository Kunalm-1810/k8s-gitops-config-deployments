apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dora-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dora-metrics.json: |
    {
      "title": "DORA Metrics",
      "uid": "dora-metrics",
      "panels": [
        {
          "title": "Deployment Frequency",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [{
            "expr": "increase(argocd_app_sync_total{phase='Succeeded'}[24h])",
            "legendFormat": "Deployments/day"
          }]
        },
        {
          "title": "Change Failure Rate",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [{
            "expr": "sum(increase(argocd_app_sync_total{phase='Failed'}[24h])) / sum(increase(argocd_app_sync_total[24h])) * 100",
            "legendFormat": "Failure Rate %"
          }]
        },
        {
          "title": "Pod Restart Count per Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [{
            "expr": "increase(kube_pod_container_status_restarts_total{namespace='production'}[1h])",
            "legendFormat": "__pod__"
          }]
        },
        {
          "title": "CPU Usage per Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='production'}[5m])) by (pod)",
            "legendFormat": "__pod__"
          }]
        },
        {
          "title": "Memory Usage per Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [{
            "expr": "sum(container_memory_working_set_bytes{namespace='production'}) by (pod)",
            "legendFormat": "__pod__"
          }]
        },
        {
          "title": "HTTP Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [{
            "expr": "sum(rate(http_requests_total{namespace='production'}[5m])) by (service)",
            "legendFormat": "__service__"
          }]
        }
      ],
      "schemaVersion": 38,
      "version": 1
    }

